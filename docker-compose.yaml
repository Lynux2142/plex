version: "3"

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=KDvfuvYas3aAJ2mDUfrajsq6fr2clLcDxP7Ptdo/AXs=
      - SERVER_COUNTRIES=Switzerland
      - VPN_PORT_FORWARDING=on
      - VPN_INTERFACE=tun0
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
    ports:
      - 8080:8080
      - 8081:8081
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    healthcheck:
      test: /gluetun-entrypoint healthcheck
      start_period: 30s
      timeout: 5s
      interval: 5s
      retries: 1

  stremio:
    image: tsaridas/stremio-docker:latest
    init: true
    container_name: stremio
    network_mode: service:gluetun
    environment:
      NO_CORS: 1
      AUTO_SERVER_URL: 1
      WEBUI_INTERNAL_PORT: 8081
    volumes:
      - config_stremio:/root/.stremio-server
      - tv:/tv
      - movies:/movies
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Paris
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - config_seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - config_jellyfin:/config
      - tv:/tv
      - movies:/movies
    ports:
      - 8096:8096
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - config_radarr:/config
      - movies:/movies
      - downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - config_sonarr:/config
      - tv:/tv
      - downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
    volumes:
      - config_prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - config_qbittorrent:/config
      - downloads:/downloads
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy

volumes:
  movies:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/movies

  tv:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/tv

  downloads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/downloads

  config_jellyfin:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/jellyfin

  config_seerr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/seerr

  config_radarr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/radarr

  config_sonarr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/sonarr

  config_prowlarr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/prowlarr

  config_qbittorrent:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/qbittorrent

  config_stremio:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/Data/config/stremio
